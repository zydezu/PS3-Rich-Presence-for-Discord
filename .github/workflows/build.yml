name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  windows_x64:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Setup venv
        run: python -m venv .venv
      - name: Install dependencies
        shell: pwsh
        run: |
          .\.venv\Scripts\activate.ps1
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
      - name: Install PyInstaller
        shell: pwsh
        run: |
          .\.venv\Scripts\activate.ps1
          pip install pyinstaller
      - name: Build Windows executable
        shell: pwsh
        run: |
          .\.venv\Scripts\activate.ps1
          pyinstaller --onefile --name "PS3RPD_Windows_x64" start.py
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: PS3RPD_Windows_x64
          path: dist/PS3RPD_Windows_x64.exe

  linux_x64:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Cache Python dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
      - name: Install PyInstaller
        run: |
          source .venv/bin/activate
          pip install pyinstaller
      - name: Build Linux executable
        run: |
          source .venv/bin/activate
          pyinstaller --onefile --name "PS3RPD_Linux_x64" start.py
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: PS3RPD_Linux_x64
          path: dist/PS3RPD_Linux_x64

  publish:
    name: Publish and Release
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - windows_x64
      - linux_x64
    steps:
      - uses: actions/checkout@v6
      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: PS3RPD_Windows_x64
          path: windows
        continue-on-error: true
      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: PS3RPD_Linux_x64
          path: linux
        continue-on-error: true
      - name: Collect artifacts
        run: |
          mkdir -p releases
          [ -d windows ] && mkdir -p releases/windows && cp windows/* releases/windows/ || true
          [ -d linux ] && mkdir -p releases/linux && cp linux/* releases/linux/ || true
      - name: Set release metadata
        run: |
          echo "REPOSITORY_NAME=$(basename $GITHUB_REPOSITORY)" >> $GITHUB_ENV
          echo "DATETIME=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
      - name: List files
        run: ls -la releases/windows/ releases/linux/ || true
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.REPOSITORY_NAME }}-${{ env.DATETIME }}
          draft: false
          prerelease: true
          generate_release_notes: true
          name: Nightly-${{ env.REPOSITORY_NAME }}-${{ env.DATETIME }}
          files: |
            releases/windows/PS3RPD_Windows_x64.exe
            releases/linux/PS3RPD_Linux_x64
